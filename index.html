```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background: linear-gradient(
        135deg,
        #ff4d4d,
        #ffd633,
        #4da6ff,
        #33cc66
    );
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:white;
    width:600px;
    max-width:95%;
    padding:40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    font-size:42px;
    margin-bottom:15px;
    color:#333;
}

p{
    font-size:20px;
    color:#555;
    margin-bottom:30px;
    line-height:1.5;
}

button{
    width:100%;
    padding:18px;
    margin:10px 0;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

.uva{
    background:#7b2cbf;
    color:white;
}

.pirex{
    background:#ff595e;
    color:white;
}

#resultado{
    display:none;
    margin-top:30px;
}

.rosto{
    font-size:70px;
}

.info{
    margin-top:20px;
    padding:20px;
    background:#f8f8f8;
    border-radius:15px;
}

.info h2{
    color:#333;
    margin-bottom:10px;
}

.info p{
    margin:5px;
}

</style>
</head>

<body>

<div class="container">

    <h1>Opá gatita!</h1>

    <p>
        Gostaria de lhe convidar para um "date".
        Então escolha um destino abaixo: 
    </p>

    <button class="uva"
    onclick="escolher('A Casa da Uva')">
        A Casa da Uva
    </button>

    <button class="pirex"
    onclick="escolher('Bar do Pirex')">
        Bar do Pirex
    </button>

    <button class="life"
    onclick="escolher('life box')">
        life box
    </button>

    <div id="resultado"></div>

</div>

<script>

function escolher(local){

document.getElementById("resultado").style.display="block";

document.getElementById("resultado").innerHTML=`

<div class="rosto">😅</div>

<div class="info">

<h2>Date marcado!</h2>

<p><strong>Data:</strong> 27 de Junho</p>

<p><strong>Destino:</strong> ${local}</p>

</div>

`;

window.scrollTo({
top: document.body.scrollHeight,
behavior:'smooth'
});

}

</script>

</body>
</html>
