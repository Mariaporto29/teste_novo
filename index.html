<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date? </title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

:root {
  --rose:    #FF4E6A;
  --peach:   #FF8C69;
  --gold:    #FFD166;
  --mint:    #06D6A0;
  --sky:     #4CC9F0;
  --purple:  #7B5EA7;
  --dark:    #1A1A2E;
  --card-bg: rgba(255,255,255,0.97);
}

body {
  min-height: 100vh;
  background: var(--dark);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  overflow-x: hidden;
  font-family: 'Inter', sans-serif;
}

/* ── Canvas de partículas ── */
#particles-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

/* ── Card principal ── */
.card {
  position: relative;
  z-index: 1;
  background: var(--card-bg);
  width: 560px;
  max-width: 95vw;
  border-radius: 32px;
  padding: 48px 44px 44px;
  text-align: center;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08),
    0 24px 60px rgba(0,0,0,.45),
    0 0 80px rgba(255,78,106,.18);
  animation: cardIn .7s cubic-bezier(.16,1,.3,1) both;
}

@keyframes cardIn {
  from { opacity:0; transform: translateY(40px) scale(.95); }
  to   { opacity:1; transform: translateY(0)   scale(1);   }
}

/* ── Título ── */
.card h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(34px, 7vw, 50px);
  font-weight: 900;
  background: linear-gradient(135deg, var(--rose), var(--peach), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
  margin-bottom: 12px;
  line-height: 1.1;
}

.card .subtitle {
  font-size: 16px;
  color: #666;
  margin-bottom: 36px;
  line-height: 1.6;
}
.card .subtitle strong {
  color: var(--rose);
  font-weight: 600;
}

/* ── Botões ── */
.btn-group { display: flex; flex-direction: column; gap: 12px; }

.btn {
  position: relative;
  width: 100%;
  padding: 18px 24px;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  font-size: 17px;
  font-weight: 600;
  font-family: 'Inter', sans-serif;
  letter-spacing: .3px;
  transition: transform .18s cubic-bezier(.34,1.56,.64,1),
              box-shadow .18s ease;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background .2s;
}
.btn:hover::after { background: rgba(255,255,255,.12); }

.btn:hover {
  transform: scale(1.04) translateY(-2px);
  box-shadow: 0 12px 32px rgba(0,0,0,.22);
}
.btn:active { transform: scale(.98) translateY(0); }

.btn-uva   { background: linear-gradient(135deg,#7B2CBF,#9D4EDD); color:#fff; box-shadow: 0 4px 16px rgba(123,44,191,.35); }
.btn-pirex { background: linear-gradient(135deg,#FF4E6A,#FF8C69); color:#fff; box-shadow: 0 4px 16px rgba(255,78,106,.35); }

/* botão fugitivo */
.btn-life {
  background: linear-gradient(135deg,#1982C4,#4CC9F0);
  color: #fff;
  box-shadow: 0 4px 16px rgba(25,130,196,.35);
  transition: transform .15s cubic-bezier(.34,1.56,.64,1),
              box-shadow .15s ease,
              left .15s ease, top .15s ease;
}

.btn-icon { font-size: 22px; }

/* ── Resultado ── */
#resultado {
  margin-top: 32px;
  opacity: 0;
  transform: translateY(20px) scale(.97);
  transition: opacity .5s ease, transform .5s cubic-bezier(.16,1,.3,1);
  pointer-events: none;
}
#resultado.show {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: auto;
}

/* Rosto animado */
.face-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 8px;
  animation: faceBounce 1.2s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes faceBounce {
  0%   { transform: scale(0) rotate(-10deg); }
  60%  { transform: scale(1.18) rotate(4deg); }
  80%  { transform: scale(.94) rotate(-2deg); }
  100% { transform: scale(1) rotate(0deg); }
}

.face-emoji {
  font-size: 90px;
  display: block;
  line-height: 1;
  filter: drop-shadow(0 6px 18px rgba(255,78,106,.35));
  animation: sweat 1.8s ease-in-out infinite;
  transform-origin: center bottom;
}

/* Gotinhas de suor voando */
.sweat-drop {
  position: absolute;
  font-size: 22px;
  animation: sweatFly 1.4s ease-in-out infinite;
  pointer-events: none;
}
.sweat-drop:nth-child(2) { top: 8px; right: -16px; animation-delay: .3s; }
.sweat-drop:nth-child(3) { top: 22px; right: -28px; font-size:16px; animation-delay: .7s; }
.sweat-drop:nth-child(4) { top: 4px; left: -18px; animation-delay: .5s; }

@keyframes sweat {
  0%,100% { transform: rotate(-3deg) scale(1); }
  25%      { transform: rotate(3deg) scale(1.04); }
  50%      { transform: rotate(-2deg) scale(.97); }
  75%      { transform: rotate(2deg) scale(1.02); }
}
@keyframes sweatFly {
  0%   { opacity:0; transform: translate(0,0) scale(.6); }
  30%  { opacity:1; }
  100% { opacity:0; transform: translate(12px,-24px) scale(1.1); }
}

/* Info box */
.info-box {
  background: linear-gradient(135deg,#fff5f7,#fff);
  border: 1.5px solid rgba(255,78,106,.18);
  border-radius: 20px;
  padding: 24px 28px;
  margin-top: 16px;
}
.info-box h2 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--dark);
  margin-bottom: 16px;
}
.info-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin: 8px 0;
  font-size: 16px;
  color: #444;
}
.info-line .label {
  font-weight: 600;
  color: var(--rose);
  min-width: 70px;
  text-align: right;
}
.info-line .value {
  text-align: left;
  min-height: 1.4em;
  font-weight: 500;
}

/* cursor piscante */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--rose);
  margin-left: 2px;
  vertical-align: middle;
  animation: blink .7s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Confetti burst (criado via JS) */
.confetti-piece {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 9999;
  animation: confettiFall var(--dur) ease-in forwards;
}
@keyframes confettiFall {
  0%   { transform: translate(0,0) rotate(0deg); opacity:1; }
  100% { transform: translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity:0; }
}

/* Heartbeat badge */
.date-badge {
  display: inline-block;
  background: linear-gradient(135deg,var(--rose),var(--peach));
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 99px;
  margin-bottom: 14px;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,78,106,.5); }
  50%      { box-shadow: 0 0 0 8px rgba(255,78,106,0); }
}

/* Shimmer nos botões no hover */
.btn::before {
  content: '';
  position: absolute;
  top: 0; left: -75%;
  width: 50%; height: 100%;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,.3) 50%, transparent 70%);
  transform: skewX(-20deg);
  transition: left .5s ease;
}
.btn:hover::before { left: 130%; }
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="card">
  <div class="date-badge">A Força decidiu… agora é contigo.</div>
  <h1>Opá gatita!</h1>
  <p class="subtitle">
    Gostaria de te convidar para um <strong>"date"</strong> .<br>
    Então escolha um destino abaixo:
  </p>

  <div class="btn-group">
    <button class="btn btn-uva" onclick="escolher('A Casa da Uva','🍷')">
      <span class="btn-icon">🍷</span> A Casa da Uva
    </button>
    <button class="btn btn-pirex" onclick="escolher('Bar do Pirex','🔥')">
      <span class="btn-icon">🔥</span> Bar do Pirex
    </button>
    <button class="btn btn-life" id="btnLife"
      onmouseover="fugir(this)"
      onclick="escolher('Life Box','🎉')">
      <span class="btn-icon">🎉</span> Life Box
    </button>
  </div>

  <div id="resultado">
    <div class="face-wrap">
      <span class="face-emoji" id="faceEmoji">😅</span>
      <span class="sweat-drop">💧</span>
      <span class="sweat-drop">💧</span>
      <span class="sweat-drop">💦</span>
      <span class="sweat-drop">💧</span>
    </div>

    <div class="info-box">
      <h2>💖 Date marcado!</h2>
      <div class="info-line">
        <span class="label">📅 Data:</span>
        <span class="value" id="textData"></span>
      </div>
      <div class="info-line">
        <span class="label">📍 Local:</span>
        <span class="value" id="textLocal"></span>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Partículas flutuantes ── */
(function() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  const COLORS = ['#FF4E6A','#FFD166','#06D6A0','#4CC9F0','#9D4EDD','#FF8C69'];
  let particles = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 55; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 3 + 1,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      vx: (Math.random() - .5) * .5,
      vy: (Math.random() - .5) * .5,
      alpha: Math.random() * .6 + .2,
      shape: Math.random() > .5 ? 'circle' : 'heart',
    });
  }

  function drawHeart(ctx, x, y, r) {
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(r * .08, r * .08);
    ctx.beginPath();
    ctx.moveTo(0, -5);
    ctx.bezierCurveTo(-12, -20, -28, 0, 0, 18);
    ctx.bezierCurveTo(28, 0, 12, -20, 0, -5);
    ctx.fill();
    ctx.restore();
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      if (p.shape === 'heart') {
        drawHeart(ctx, p.x, p.y, p.r);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      p.x += p.vx; p.y += p.vy;
      if (p.x < -20) p.x = canvas.width + 20;
      if (p.x > canvas.width + 20) p.x = -20;
      if (p.y < -20) p.y = canvas.height + 20;
      if (p.y > canvas.height + 20) p.y = -20;
    });
    requestAnimationFrame(animate);
  }
  animate();
})();

/* ── Typewriter ── */
function typeWriter(element, text, speed, callback) {
  element.textContent = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  element.appendChild(cursor);

  let i = 0;
  function type() {
    if (i < text.length) {
      cursor.insertAdjacentText('beforebegin', text[i]);
      i++;
      setTimeout(type, speed + Math.random() * 30);
    } else {
      cursor.remove();
      if (callback) callback();
    }
  }
  type();
}

/* ── Confetti burst ── */
function burst(originX, originY) {
  const colors = ['#FF4E6A','#FFD166','#06D6A0','#4CC9F0','#9D4EDD','#FF8C69','#fff'];
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const angle = Math.random() * 360;
    const dist  = 120 + Math.random() * 200;
    const tx = Math.cos(angle * Math.PI / 180) * dist;
    const ty = Math.sin(angle * Math.PI / 180) * dist - 80;
    el.style.cssText = `
      left:${originX}px; top:${originY}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      --tx:${tx}px; --ty:${ty}px;
      --rot:${Math.random()*720 - 360}deg;
      --dur:${.8 + Math.random() * .8}s;
      width:${6 + Math.random() * 8}px;
      height:${6 + Math.random() * 8}px;
      border-radius:${Math.random() > .5 ? '50%' : '2px'};
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  }
}

/* ── Função principal ── */
function escolher(local, icone) {
  // confetti na origem (centro do card)
  const card = document.querySelector('.card');
  const rect = card.getBoundingClientRect();
  burst(rect.left + rect.width / 2, rect.top + rect.height / 2);

  const resultado = document.getElementById('resultado');
  resultado.classList.add('show');

  // rosto animado
  const face = document.getElementById('faceEmoji');
  face.style.animation = 'none';
  void face.offsetWidth;
  face.style.animation = 'faceBounce .8s cubic-bezier(.36,.07,.19,.97) both, sweat 1.8s ease-in-out 1s infinite';

  // typewriter — data primeiro, depois local
  const elData  = document.getElementById('textData');
  const elLocal = document.getElementById('textLocal');

  typeWriter(elData, '27 de Junho', 60, () => {
    setTimeout(() => {
      typeWriter(elLocal, `${icone}  ${local}`, 55);
    }, 200);
  });

  // scroll suave
  setTimeout(() => {
    resultado.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
}

/* ── Botão fugitivo ── */
(function() {
  const btn = document.getElementById('btnLife');
  let inArea = false;

  btn.addEventListener('mouseenter', () => { inArea = true; });
  btn.addEventListener('mouseleave', () => { inArea = false; });

  let raf;
  function fuga() {
    if (!inArea) return;
    const parent = btn.parentElement.getBoundingClientRect();
    const b      = btn.getBoundingClientRect();

    const maxX = parent.width  - b.width;
    const maxY = parent.height - b.height;

    const rx = Math.random() * maxX;
    const ry = Math.random() * maxY;

    btn.style.position   = 'absolute';
    btn.style.left       = rx + 'px';
    btn.style.top        = ry + 'px';
    btn.style.zIndex     = '10';
    btn.style.width      = (b.width) + 'px';
    btn.style.transition = 'left .15s cubic-bezier(.34,1.56,.64,1), top .15s cubic-bezier(.34,1.56,.64,1)';

    raf = setTimeout(fuga, 160);
  }

  btn.addEventListener('mouseenter', fuga);
  btn.addEventListener('mouseleave', () => { clearTimeout(raf); });

  // garante que o grupo de botões tem position relative
  btn.parentElement.style.position = 'relative';
  btn.parentElement.style.minHeight = '180px';
})();
</script>
</body>
</html>
